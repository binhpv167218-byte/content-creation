name: Auto Publish — IQI Page

# Chạy mỗi 30 phút — script tự detect slot + jitter 0–400s
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: # Fallback thủ công

jobs:
  publish-iqi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run IQI scheduler
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          FACEBOOK_TOKEN_BINH_PHAN_IQI: ${{ secrets.FACEBOOK_TOKEN_BINH_PHAN_IQI }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/schedule_publish_iqi.py
