name: Auto Publish — Scheduled Posts

on:
  schedule:
    # 08:00, 12:00, 18:00, 21:00 giờ VN (UTC+7)
    - cron: "55 0 * * *" # 07:55 VN
    - cron: "55 4 * * *" # 11:55 VN
    - cron: "55 10 * * *" # 17:55 VN
    - cron: "55 13 * * *" # 20:55 VN
  workflow_dispatch: # Fallback: trigger thủ công hoặc từ cron-job.org

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run scheduler
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          FACEBOOK_TOKEN_BINH_PHAN_IQI: ${{ secrets.FACEBOOK_TOKEN_BINH_PHAN_IQI }}
          FACEBOOK_TOKEN_BINH_ME_NHA: ${{ secrets.FACEBOOK_TOKEN_BINH_ME_NHA }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: python scripts/schedule_publish.py
