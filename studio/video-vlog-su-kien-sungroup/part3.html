<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @font-face {
        font-family: "Be Vietnam Pro";
        font-weight: 300;
        src:
          url("fonts/BeVietnamPro-Light-vietnamese.woff2") format("woff2"),
          url("fonts/BeVietnamPro-Light-latin.woff2") format("woff2");
      }
      @font-face {
        font-family: "Be Vietnam Pro";
        font-weight: 400;
        src:
          url("fonts/BeVietnamPro-Regular-vietnamese.woff2") format("woff2"),
          url("fonts/BeVietnamPro-Regular-latin.woff2") format("woff2");
      }
      @font-face {
        font-family: "Be Vietnam Pro";
        font-weight: 600;
        src:
          url("fonts/BeVietnamPro-SemiBold-vietnamese.woff2") format("woff2"),
          url("fonts/BeVietnamPro-SemiBold-latin.woff2") format("woff2");
      }
      @font-face {
        font-family: "Be Vietnam Pro";
        font-weight: 900;
        src:
          url("fonts/BeVietnamPro-Black-vietnamese.woff2") format("woff2"),
          url("fonts/BeVietnamPro-Black-latin.woff2") format("woff2");
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #0a0a0a;
        font-family: "Be Vietnam Pro", system-ui, sans-serif;
        cursor: none;
      }

      /* ── Background clips ── */
      .bg-vid {
        position: absolute;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        opacity: 0;
      }

      /* ── Bottom gradient only — vlog style ── */
      #bot-grad {
        position: absolute;
        z-index: 2;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 960px;
        background: linear-gradient(
          to bottom,
          transparent 0%,
          rgba(0, 0, 0, 0.68) 100%
        );
        pointer-events: none;
      }

      /* ── Caption layer ── */
      #cap-layer {
        position: absolute;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }

      /* Base caption */
      .cap {
        position: absolute;
        left: 72px;
        right: 72px;
        opacity: 0;
      }

      /* Hook — big centered title — YELLOW */
      .cap-hook {
        top: 820px;
        text-align: center;
        font-size: 92px;
        font-weight: 900;
        color: #f5d878;
        line-height: 1.05;
        text-shadow: 0 4px 32px rgba(245, 216, 120, 0.4);
      }
      .cap-hook-sub {
        top: 1010px;
        text-align: center;
        font-size: 50px;
        font-weight: 400;
        color: rgba(245, 216, 120, 0.8);
        line-height: 1.35;
      }
      .cap-hook-cue {
        top: 1140px;
        text-align: center;
        font-size: 44px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.75);
        line-height: 1.4;
      }

      /* Body — bottom safe zone — WHITE */
      .cap-body {
        bottom: 430px;
        font-size: 52px;
        font-weight: 600;
        color: #ffffff;
        line-height: 1.35;
        text-align: left;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
      }

      /* ── CTA scene ── */
      #cta {
        position: absolute;
        inset: 0;
        z-index: 15;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        opacity: 0;
        padding: 200px 64px 400px;
        background: rgba(0, 0, 0, 0.55);
      }
      .cta-avatar {
        width: 336px;
        height: 336px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid rgba(245, 216, 120, 0.6);
        box-shadow: 0 0 40px rgba(245, 216, 120, 0.3);
        opacity: 0;
      }
      .cta-main {
        font-size: 72px;
        font-weight: 900;
        color: #f5d878;
        text-align: center;
        line-height: 1.1;
        opacity: 0;
        text-shadow:
          0 2px 20px rgba(0, 0, 0, 0.9),
          0 0 40px rgba(0, 0, 0, 0.7);
      }
      .cta-sub {
        font-size: 40px;
        font-weight: 600;
        color: #ffffff;
        text-align: center;
        line-height: 1.4;
        opacity: 0;
        text-shadow: 0 2px 16px rgba(0, 0, 0, 0.9);
      }
      .cta-name {
        font-size: 32px;
        font-weight: 600;
        color: #ffffff;
        text-align: center;
        margin-top: 12px;
        opacity: 0;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
      }
      .cta-name span {
        color: #ffd966;
      }

      /* ── Branding badge — top-right ── */
      #brand-badge {
        position: absolute;
        top: 248px;
        right: 72px;
        font-size: 26px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.6);
        letter-spacing: 0.5px;
        z-index: 11;
        opacity: 0;
      }
      #brand-badge span {
        color: #ffd966;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="vlog-part3"
      data-start="0"
      data-duration="20"
      data-width="1080"
      data-height="1920"
    >
      <video
        id="c04b"
        class="bg-vid clip"
        src="assets/c04b.mp4"
        muted
        preload="auto"
        playsinline
        data-start="0"
        data-duration="7"
        data-track-index="1"
        data-volume="0"
      ></video>
      <video
        id="c07b"
        class="bg-vid clip"
        src="assets/c07b.mp4"
        muted
        preload="auto"
        playsinline
        data-start="7"
        data-duration="7"
        data-track-index="2"
        data-volume="0"
      ></video>
      <video
        id="c06b"
        class="bg-vid clip"
        src="assets/c06b.mp4"
        muted
        preload="auto"
        playsinline
        data-start="14"
        data-duration="6"
        data-track-index="3"
        data-volume="0"
      ></video>
      <!-- ── Bottom gradient ── -->
      <div id="bot-grad"></div>
      <audio
        id="bgm"
        class="clip"
        src="assets/bgm.mp3"
        preload="auto"
        data-start="0"
        data-duration="20"
        data-track-index="0"
        data-volume="0.2"
      ></audio>
      <audio
        id="vo6"
        class="clip"
        src="assets/vo_s6.mp3"
        preload="auto"
        data-start="0.2"
        data-duration="12"
        data-track-index="26"
        data-volume="1"
      ></audio>
      <audio
        id="vo7"
        class="clip"
        src="assets/vo_s7.mp3"
        preload="auto"
        data-start="14.2"
        data-duration="3"
        data-track-index="27"
        data-volume="1"
      ></audio>
      <audio
        id="sfx-cta-p"
        class="clip"
        src="assets/sfx_pop.mp3"
        preload="auto"
        data-start="14"
        data-duration="1"
        data-track-index="32"
        data-volume="0.4"
      ></audio>
      <audio
        id="sfx-cta-w"
        class="clip"
        src="assets/sfx_whoosh.mp3"
        preload="auto"
        data-start="14.3"
        data-duration="2"
        data-track-index="33"
        data-volume="0.3"
      ></audio>
      <!-- ── Caption layer ── -->
      <div id="cap-layer">
        <!-- S6 (offset -60) -->
        <div id="c-s6-1" class="cap cap-body">
          Mình qua nhiều<br />sự kiện rồi.
        </div>
        <div id="c-s6-2" class="cap cap-body">
          Nhưng lễ bàn giao sổ đỏ<br />thật sự khác.
        </div>
        <div id="c-s6-3" class="cap cap-body">
          Cư dân cầm tờ giấy đó,<br />mặt họ khác.
        </div>
        <div id="c-s6-4" class="cap cap-body">
          Không phải vì<br />giá trị tài sản.
        </div>
        <div id="c-s6-5" class="cap cap-body">Mà vì lời hứa được giữ.</div>
        <div id="c-s6-6" class="cap cap-body">
          Hôm nay có một khách<br />hỏi Bình một câu...
        </div>
        <div id="c-s6-7" class="cap cap-body">Video sau mình kể.</div>
      </div>
      <!-- CTA -->
      <div id="cta">
        <img
          id="cta-avatar"
          class="cta-avatar clip"
          src="assets/me-outtro.jpg"
          alt=""
          data-start="14"
          data-duration="6"
          data-track-index="50"
          data-volume="0"
        />
        <div
          id="cta-main"
          class="cta-main clip"
          data-start="14"
          data-duration="6"
          data-track-index="51"
          data-volume="0"
          style="opacity: 0"
        >
          Theo dõi Bình
        </div>
        <div
          id="cta-sub"
          class="cta-sub clip"
          data-start="14"
          data-duration="6"
          data-track-index="52"
          data-volume="0"
          style="opacity: 0"
        >
          để xem thêm hậu trường<br />như vầy nhé.
        </div>
        <div
          id="cta-name"
          class="cta-name clip"
          data-start="14"
          data-duration="6"
          data-track-index="53"
          data-volume="0"
          style="opacity: 0"
        >
          Bình Phan <span>IQI</span>
        </div>
      </div>
    </div>

    <script>
      /* zoomCut disabled for render */
      function zoomCut(t) {}

      function showCap(id, t, dur) {
        tl.fromTo(
          `#${id}`,
          { opacity: 0, y: 18 },
          { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" },
          t,
        );
        if (dur) {
          tl.to(
            `#${id}`,
            { opacity: 0, y: -8, duration: 0.25, ease: "power2.in" },
            t + dur,
          );
        }
      }

      const tl = gsap.timeline({ paused: true });

      // Video clips (offset -60)
      tl.fromTo("#c04b", { opacity: 0 }, { opacity: 1, duration: 0.3 }, 0);
      tl.to("#c04b", { opacity: 0, duration: 0.3 }, 6.7);
      tl.fromTo("#c07b", { opacity: 0 }, { opacity: 1, duration: 0.3 }, 7);
      tl.to("#c07b", { opacity: 0, duration: 0.3 }, 13.7);
      tl.fromTo("#c06b", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 14);

      // S6 captions (offset -60)
      zoomCut(0);
      showCap("c-s6-1", 0.3, 1.0);
      showCap("c-s6-2", 1.7, 1.3);
      showCap("c-s6-3", 3.6, 1.6);
      showCap("c-s6-4", 5.7, 1.3);
      showCap("c-s6-5", 7.2, 1.7);
      showCap("c-s6-6", 8.7, 1.7);
      showCap("c-s6-7", 10.8, 3.0);

      // S7 CTA (offset -60)
      zoomCut(14);
      tl.fromTo(
        "#cta",
        { opacity: 0 },
        { opacity: 1, duration: 0.6, ease: "power2.out" },
        14,
      );
      tl.fromTo(
        "#cta-avatar",
        { opacity: 0, scale: 0.88 },
        { opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.4)" },
        14.2,
      );
      tl.fromTo(
        "#cta-main",
        { opacity: 0, y: 24 },
        { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
        14.5,
      );
      tl.fromTo(
        "#cta-sub",
        { opacity: 0, y: 16 },
        { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
        14.85,
      );
      tl.fromTo(
        "#cta-name",
        { opacity: 0, y: 10 },
        { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" },
        15.2,
      );

      window.__timelines = window.__timelines || {};
      window.__timelines["vlog-part3"] = tl;
    </script>
  </body>
</html>
